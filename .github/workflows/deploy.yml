name: Django CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       diaz_moviles_db
          POSTGRES_USER:     diaz_moviles_user
          POSTGRES_PASSWORD: diaz_moviles_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          SECRET_KEY:    test-secret-key-for-ci-only
          DEBUG:         True
          ALLOWED_HOSTS: localhost,127.0.0.1
          DB_NAME:       diaz_moviles_db
          DB_USER:       diaz_moviles_user
          DB_PASSWORD:   diaz_moviles_pass
          DB_HOST:       localhost
          DB_PORT:       5432
          CORS_ALLOW_ALL_ORIGINS: True
        # Si aún no tienes tests creados, este comando pasará automáticamente o indicará que no hay tests.
        run: uv run python manage.py test --verbosity=2

  deploy:
    name: Deploy to DigitalOcean
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Droplet
        env:
          VPS_HOST:    ${{ secrets.VPS_HOST }}
          VPS_USER:    ${{ secrets.VPS_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            echo "── 1. Entrando al proyecto y actualizando código ──"
            cd $DEPLOY_PATH
            git pull origin main

            echo "── 2. Instalando dependencias nuevas ──"
            /root/.local/bin/uv sync

            echo "── 3. Aplicando migraciones de Base de Datos ──"
            /root/.local/bin/uv run python manage.py migrate --noinput

            echo "── 4. Recolectando archivos estáticos ──"
            /root/.local/bin/uv run python manage.py collectstatic --noinput --clear

            echo "── 5. Reiniciando Gunicorn y Nginx ──"
            # Asegúrate de que el nombre del servicio coincida con el que creaste
            systemctl restart gunicorn-shopapi
            systemctl restart nginx

            echo "── 6. Despliegue completado con éxito ──"
          ENDSSH